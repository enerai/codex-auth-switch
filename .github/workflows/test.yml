name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  zsh-tests:
    name: zsh tests on macOS
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check shell syntax
        run: zsh -n codex-auth-switch

      - name: Run shell test suite
        run: zsh tests/test_codex_auth_switch.sh
